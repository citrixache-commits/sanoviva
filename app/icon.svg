<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7DE0ED"/>
      <stop offset="35%" stop-color="#26C6DA"/>
      <stop offset="70%" stop-color="#00838F"/>
      <stop offset="100%" stop-color="#006978"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="topLight" cx="25%" cy="15%" r="65%">
      <stop offset="0%" stop-color="white" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bottomDark" x1="0%" y1="55%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#003D4D" stop-opacity="0"/>
      <stop offset="100%" stop-color="#003D4D" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="sg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#B2EBF2"/>
    </linearGradient>
    <filter id="sshadow" x="-30%" y="-30%" width="160%" height="160%">
