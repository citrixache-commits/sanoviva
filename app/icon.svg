<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00BCD4"/>
      <stop offset="100%" stop-color="#00838F"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#004D40" flood-opacity="0.4"/>
    </filter>
    <filter id="inner-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feFlood flood-color="white" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="glow"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="url(#shine)"/>
  <text x="256" y="380" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="340" font-weight="800" fill="white" text-anchor="middle" filter="url(#shadow)">S</text>
  <circle cx="408" cy="408" r="28" fill="#FF7043" opacity="0.15"/>
  <circle cx="408" cy="408" r="17" fill="#FF7043"/>
</svg>
